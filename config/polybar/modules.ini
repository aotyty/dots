
[module/launcher]
type = custom/text
content = "¾░Żć"
content-foreground = ${colors.blue}
content-padding = 1
content-font = 1

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true
enable-scroll = false

label-active = "¾░«»"
label-active-foreground = ${colors.yellow}
label-active-background = ${colors.background}
label-active-padding = 1

label-occupied = "¾░ŖĀ"
label-occupied-foreground = ${colors.blue}
label-occupied-background = ${colors.background}
label-occupied-padding = 1

label-urgent = "¾░Øź"
label-urgent-foreground = ${colors.red}
label-urgent-background = ${colors.background}
label-urgent-padding = 1

label-empty = "¾░¦×"
label-empty-foreground = ${colors.gray}
label-empty-background = ${colors.background}
label-empty-padding = 1

[module/date]
type = custom/script
interval = 1
exec = LC_TIME="en_US.UTF-8" date "+%I:%M %p"
label-foreground = ${colors.foreground}
label-background = ${colors.background}
label-font = 0

[module/memory]
type = internal/memory
interval = 2
label = "¾░śÜ %percentage_used%%"
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
label = "¾░Źø %percentage%%"
label-foreground = ${colors.foreground}

[module/systray]
type = custom/text
label = "¾░Č╣"
label-foreground = ${colors.foreground}
label-font = 1

[module/volume]
type = custom/script
exec = scripts/volume.sh
interval = 5
content-font = 1
label-background = ${colors.background}
label-foreground = ${colors.green}

[module/battery]
type = internal/battery
battery = BAT1
full-at = 98

format-charging = <animation-charging>
format-charging-foreground = ${colors.blue}
format-charging-background = ${colors.background}

format-discharging = <ramp-capacity>
format-discharging-background = ${colors.background}

ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-foreground = ${colors.aqua}

ramp-capacity-0 = " ¾░ü║"
ramp-capacity-1 = " ¾░ü╝"
ramp-capacity-2 = " ¾░üŠ"
ramp-capacity-3 = " ¾░éĆ"
ramp-capacity-4 = " ¾░ü╣"

animation-charging-0 = " ¾░ó£"
animation-charging-1 = " ¾░éć"
animation-charging-2 = " ¾░óØ"
animation-charging-3 = " ¾░ó×"
animation-charging-4 = " ¾░éģ"
animation-charging-framerate = 700

[module/powermenu]
type = custom/text
content = " ’Ćæ  "
content-foreground = ${colors.red}
content-padding = 0
content-font = 1

[module/spac]
type = custom/text
content = " "
content-foreground = ${colors.blue}
content-font = 0

[module/spac2]
type = custom/text
content = " "
content-foreground = ${colors.blue}
content-background = ${colors.background}
content-font = 0

[module/left]
type = custom/text
content = "ŅéČ"
content-foreground = ${colors.background}
content-font = 1
content-padding = 0

[module/right]
type = custom/text
content = "Ņé┤"
content-foreground = ${colors.background}
content-font = 1

[module/now-playing]
type = custom/script
exec = ~/.config/bspwm/config/polybar/scripts/musicplayer.sh
interval = 1
click-left = playerctl play-pause
click-right = playerctl next
tail = true

[module/weather]
type = custom/script
exec = ~/.config/bspwm/config/polybar/scripts/weather.sh
interval = 30
label-font = 0

[module/updates]
type = custom/script
exec = ~/.config/bspwm/config/polybar/scripts/updates.sh
interval = 10

[module/network]
type = custom/script
exec = Network --icono
interval = 5
content-font = 1
label-background = ${colors.background}
label-foreground = ${colors.purple}
