; ============================================
; ЦВЕТА GRUVBOX
; ============================================
[colors]
background = #282828
foreground = #ebdbb2
black = #1d2021
white = #fbf1c7
gray = #928374
red = #fb4934
green = #b8bb26
yellow = #fabd2f
blue = #83a598
purple = #d3869b
aqua = #8ec07c
orange = #fe8019
dark-aqua = #689d6a

; ============================================
; БАР
; ============================================
[bar/top]
; monitor = ${env:MONITOR}  ; закомментировано или удалено
width = 98.7%
height = 42
offset-x = 13
offset-y = 12
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 3
border-color = ${colors.foreground}
radius = 8

padding = 1

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:style=Bold:size=15;3

modules-left = launcher spac xworkspaces spac now-playing spac
modules-center = date
modules-right = key-icon spac xkeyboard spac spac memory spac spac cpu spac spac brightness spac spac pulseaudio spac battery spac spac  bluetooth spac network

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

[settings]
screenchange-reload = true
pseudo-transparency = true

; ============================================
; МОДУЛИ
; ============================================

[module/launcher]
type = custom/text
content = "󰣇"
click-left = rofi -show drun
content-foreground = ${colors.blue}
content-padding = 1
content-font = 1

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-scroll = false

label-active = "󰮯"
label-active-foreground = ${colors.yellow}
label-active-background = ${colors.background}
label-active-padding = 1

label-occupied = "󰊠"
label-occupied-foreground = ${colors.red}
label-occupied-background = ${colors.background}
label-occupied-padding = 1

label-urgent = "󰝥"
label-urgent-foreground = ${colors.blue}
label-urgent-background = ${colors.background}
label-urgent-padding = 1

label-empty = "󰧞"
label-empty-foreground = ${colors.gray}
label-empty-background = ${colors.background}
label-empty-padding = 1

[module/date]
type = custom/script
interval = 1
exec = echo "  $(LC_TIME="en_US.UTF-8" date "+%I:%M %p")"
label-foreground = ${colors.foreground}
label-background = ${colors.background}
label-font = 0

[module/memory]
type = internal/memory
interval = 2
format = <ramp-used> <label>
ramp-used-0 = 󰘚
ramp-used-foreground = ${colors.green}
label = "%percentage_used%%"
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.gray}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>
label-muted =   
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.purple}

[module/battery]
type = internal/battery
battery = BAT0
poll-interval = 5
full-at = 100

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.blue}
format-charging-background = ${colors.background}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background}

ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-foreground = ${colors.aqua}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = " 󰁺"
ramp-capacity-1 = " 󰁼"
ramp-capacity-2 = " 󰁾"
ramp-capacity-3 = " 󰂀"
ramp-capacity-4 = " 󰁹"

animation-charging-0 = " 󰢜"
animation-charging-1 = " 󰂇"
animation-charging-2 = " 󰢝"
animation-charging-3 = " 󰢞"
animation-charging-4 = " 󰂅"
animation-charging-framerate = 250

[module/brightness]
type = internal/backlight
format = <ramp> <label>
label = %percentage%%
ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-3 = 󰃠
ramp-foreground = ${colors.orange}

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout> <label-indicator>

; Используем условные иконки/текст через layout-icon
layout-icon-0 = us;US
layout-icon-1 = ru;RU

; Теперь используем %icon% вместо %layout%
label-layout = %icon%
; Настройка индикаторов (Caps Lock, Num Lock)
; Можно игнорировать ненужные индикаторы
blacklist-0 = num lock
blacklist-1 = scroll lock

; Индикатор Caps Lock (будет показывать "+C" когда включен)
label-indicator-on-capslock = +C

; Игнорировать другие индикаторы
; label-indicator-off-capslock = 
; label-indicator-on-numlock = 
; label-indicator-off-numlock =

[module/key-icon]
type = custom/text
content = 󰌌
content-foreground = ${colors.dark-aqua}

[module/powermenu]
type = custom/text
content = "   "
click-left = ~/.config/rofi/powermenu/powermenu.sh
content-foreground = ${colors.red}
content-padding = 0
content-font = 1

[module/spac]
type = custom/text
content = " "
content-foreground = ${colors.blue}
content-font = 0

[module/now-playing]
type = custom/script
exec = ~/.config/polybar/scripts/musicplayer.sh
interval = 1
click-left = playerctl play-pause
click-right = playerctl next
tail = true

; [module/weather]
; type = custom/script
; exec = ~/.config/polybar/scripts/weather.sh
; interval = 30
; label-font = 0

; [module/updates]
; type = custom/script
; exec = ~/.config/polybar/scripts/updates.sh
; interval = 10

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh status
interval = 5
click-left = ~/.config/polybar/scripts/network.sh toggle
content-font = 1
label-background = ${colors.background}
label-foreground = ${colors.white}

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh status
interval = 5 
click-left = ~/.config/polybar/scripts/bluetooth.sh toggle
label-background = ${colors.background}
label-foreground = ${colors.blue}


[module/left]
type = custom/text
content = ""
content-foreground = ${colors.yellow}
content-font = 1
content-padding = 0

[module/right]
type = custom/text
content = ""
content-foreground = ${colors.yellow}
content-font = 1

[module/cava]
type = custom/script
tail = true
exec = /home/aoiity/.config/polybar/scripts/cava.sh
format = <label>
label = %output%
